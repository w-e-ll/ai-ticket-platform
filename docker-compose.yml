services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-ticket-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_ticket_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_ticket_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai-ticket-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-ticket-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/ai_ticket_platform
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./models:/app/models
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      uvicorn ai_ticket_platform.app.main:app
      --host 0.0.0.0
      --port 8000

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-ticket-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/ai_ticket_platform
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ./uploads:/app/uploads
      - ./models:/app/models
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery
      -A ai_ticket_platform.app.workers.tasks.celery_app
      worker
      --loglevel=INFO

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-ticket-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8000/api/v1
    ports:
      - "8501:8501"
    depends_on:
      - api
    command: >
      streamlit run ai_ticket_platform/frontend/streamlit_app.py
      --server.port=8501
      --server.address=0.0.0.0

volumes:
  postgres_data:
  redis_data:
